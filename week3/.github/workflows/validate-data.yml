name: Data Quality Check

on:
  schedule:
    - cron: '*/30 * * * *'  # TODO: Choose your frequency (15min? hourly? daily?)
  push:
    branches: [main]
    paths:
      - 'week3/data/**'
      - 'week3/validation/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy

      - name: Run data quality validation
        id: validate
        run: |
          cd week3
          python3 -m validation.run_validation

      - name: Block deployment if validation fails
        if: failure()
        run: |
          echo "Data validation FAILED"
          echo "Check logs above for issues"
          exit 1

      - name: Validation passed
        if: success()
        run: echo "Data quality validation passed"
